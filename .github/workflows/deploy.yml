name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EB_APP_NAME: ${{ vars.EB_APP_NAME }}
  EB_ENV_NAME: ${{ vars.EB_ENV_NAME }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Generate version label
        id: version
        run: echo "label=v-${GITHUB_SHA::7}-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Package source bundle
        run: |
          cp target/src-0.0.1-SNAPSHOT.jar src-0.0.1-SNAPSHOT.jar
          zip deploy.zip src-0.0.1-SNAPSHOT.jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload bundle to S3
        run: |
          aws s3 cp deploy.zip \
            s3://${{ env.S3_BUCKET }}/${{ steps.version.outputs.label }}.zip

      - name: Create Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APP_NAME }} \
            --version-label ${{ steps.version.outputs.label }} \
            --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=${{ steps.version.outputs.label }}.zip

      - name: Deploy to Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ env.EB_ENV_NAME }} \
            --version-label ${{ steps.version.outputs.label }}